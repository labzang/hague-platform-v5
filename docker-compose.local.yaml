# ============================================================================
# 통합 Docker Compose 설정
# ============================================================================
# Neon PostgreSQL + Upstash Redis 연동
# profiles로 서비스 그룹을 선택 실행합니다.
#
# 사용 예시:
#   - Labzang FastAPI 모놀리식만 (기본):
#     docker compose -f docker-compose.local.yaml up
#
#   - Spring 게이트웨이·OAuth·User (api.labzang.com / core.labzang.com):
#     docker compose -f docker-compose.local.yaml --profile spring up
#
#   - ERP (erp.labzang.com FastAPI):
#     docker compose -f docker-compose.local.yaml --profile erp up
#
#   - 레거시 AI 스택 (ai.labzang.com):
#     docker compose -f docker-compose.local.yaml --profile ai up
#
# 주의: 루트에 .env (env.template 참고). Docker Desktop 실행 필요.
# ============================================================================

services:
  # ========================================================================
  # Labzang FastAPI 모놀리식 (backend/labzang, 단일 컨테이너)
  # ========================================================================
  labzang:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: labzang
    ports:
      - "8000:8000"
    networks:
      - labzang-network
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL}
      - UPSTASH_REDIS_HOST=${UPSTASH_REDIS_HOST}
      - UPSTASH_REDIS_PORT=${UPSTASH_REDIS_PORT}
      - UPSTASH_REDIS_PASSWORD=${UPSTASH_REDIS_PASSWORD}
      - REDIS_URL=${UPSTASH_REDIS_URL}
      - REDIS_HOST=${UPSTASH_REDIS_HOST}
      - REDIS_PORT=${UPSTASH_REDIS_PORT}
      - REDIS_PASSWORD=${UPSTASH_REDIS_PASSWORD}
      - REDIS_SSL_ENABLED=${REDIS_SSL_ENABLED:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    env_file:
      - .env
    restart: on-failure
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ========================================================================
  # Gateway Service (Spring Boot) — profile: spring
  # ========================================================================
  gateway:
    build:
      context: ./api.labzang.com
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    networks:
      - labzang-network
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-default}
      - SPRING_DATASOURCE_URL=${DATABASE_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      - SPRING_JPA_SHOW_SQL=${SPRING_JPA_SHOW_SQL:-true}
      - SPRING_REDIS_HOST=${UPSTASH_REDIS_HOST}
      - SPRING_REDIS_PORT=${UPSTASH_REDIS_PORT}
      - SPRING_REDIS_PASSWORD=${UPSTASH_REDIS_PASSWORD}
      - SPRING_REDIS_SSL_ENABLED=true
      - REDIS_HOST=${UPSTASH_REDIS_HOST}
      - REDIS_PORT=${UPSTASH_REDIS_PORT}
      - REDIS_PASSWORD=${UPSTASH_REDIS_PASSWORD}
      - REDIS_URL=${UPSTASH_REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
    env_file:
      - .env
    depends_on:
      - oauthservice
      - userservice
    profiles:
      - spring
    restart: on-failure

  # ========================================================================
  # OAuth Service (Spring Boot)
  # ========================================================================
  oauthservice:
    build:
      context: ./core.labzang.com/oauthservice
      dockerfile: Dockerfile
    container_name: oauthservice
