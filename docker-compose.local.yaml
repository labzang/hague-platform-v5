    networks:
      - labzang-network
    volumes:
      # KoELECTRA 모델 파일 마운트 (영구 저장)
      - ./ai.labzang.com/transformerservice/app/koelectra/koelectra_model:/app/app/koelectra/koelectra_model
      # Transformers 캐시 디렉토리 마운트
      - ./ai.labzang.com/transformerservice/app/koelectra/cache:/app/app/koelectra/cache
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL}
      - UPSTASH_REDIS_HOST=${UPSTASH_REDIS_HOST}
      - UPSTASH_REDIS_PORT=${UPSTASH_REDIS_PORT}
      - UPSTASH_REDIS_PASSWORD=${UPSTASH_REDIS_PASSWORD}
      - REDIS_URL=${UPSTASH_REDIS_URL}
      - REDIS_HOST=${UPSTASH_REDIS_HOST}
      - REDIS_PORT=${UPSTASH_REDIS_PORT}
      - REDIS_PASSWORD=${UPSTASH_REDIS_PASSWORD}
      - REDIS_SSL_ENABLED=true
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      # UTF-8 인코딩 강제 설정 (한글 깨짐 방지)
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - PYTHONIOENCODING=utf-8
      # Transformers 관련 환경변수
      - TRANSFORMERS_CACHE=/app/app/koelectra/cache
      - HF_HOME=/app/app/koelectra/cache
      - TOKENIZERS_PARALLELISM=false
      # GPU 설정 (사용 가능한 경우)
      - USE_GPU=false
      - TORCH_HOME=/app/app/koelectra/cache
    env_file:
      - .env
    profiles:
      - ai
    restart: on-failure
    # 헬스체크 설정
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9020/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ========================================================================
# Networks
# ========================================================================
networks:
  labzang-network:
    driver: bridge
    name: labzang-network

# ========================================================================
# 사용법
# ========================================================================
# 1. .env 파일 생성: env.template을 참고하여 .env 파일 생성
# 2. Neon PostgreSQL과 Upstash Redis 정보 입력
# 3. 기본(Labzang 모놀리식): docker compose -f docker-compose.local.yaml up
# 4. Spring 포함: docker compose -f docker-compose.local.yaml --profile spring up
# 5. ERP: docker compose -f docker-compose.local.yaml --profile erp up
# 6. 레거시 AI: docker compose -f docker-compose.local.yaml --profile ai up
# ========================================================================
