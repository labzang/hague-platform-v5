
services:
  # 통합된 Labzang API 서비스
  labzang-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labzang-api
    ports:
      - "8080:8080"
    env_file:
      - .env
      - ../.env
    environment:
      # 데이터베이스 설정 (.env 파일에서 가져옴)
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      
      # Redis 설정 (Upstash Redis - .env 파일에서 가져옴)
      - UPSTASH_REDIS_HOST=${UPSTASH_REDIS_HOST}
      - UPSTASH_REDIS_PORT=${UPSTASH_REDIS_PORT}
      - UPSTASH_REDIS_PASSWORD=${UPSTASH_REDIS_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${UPSTASH_REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${UPSTASH_REDIS_PORT}
      - SPRING_DATA_REDIS_PASSWORD=${UPSTASH_REDIS_PASSWORD}
      - SPRING_DATA_REDIS_SSL_ENABLED=true
      
      # JWT 설정 (.env 파일에서 가져옴)
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRATION=${JWT_ACCESS_TOKEN_EXPIRATION:-3600000}
      - JWT_REFRESH_TOKEN_EXPIRATION=${JWT_REFRESH_TOKEN_EXPIRATION:-2592000000}
      
      # OAuth 설정 (.env 파일에서 가져옴)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
      - KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}
      
      # Frontend URL 설정
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      
      # 프로파일 설정
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-default}
    networks:
      - labzang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "api.labzang.com/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


networks:
  labzang-network:
    driver: bridge
